<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SplitMate</title>
    <link rel="manifest" href="/public/manifest.json">
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/transitions.css">
</head>
<body class="app-shell">

    <div id="splash-screen">
        <div class="loader-logo">
            <img src="/public/logo.svg" alt="SplitMate" width="80">
        </div>
    </div>

    <main id="app-root" class="hidden">
        <header class="app-header">
            <div id="header-left"></div>
            <div class="header-center">SplitMate</div>
            <div id="header-right"></div>
        </header>

        <div id="view-container">
            </div>
    </main>

    <script type="module" src="src/js/app.js"></script>
    <script>
        // Smooth Splash Transition
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            const root = document.getElementById('app-root');
            
            setTimeout(() => {
                splash.classList.add('fade-out');
                root.classList.remove('hidden');
                root.classList.add('fade-in');
                setTimeout(() => splash.remove(), 500);
            }, 1500);
        });

        // Register SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</body>
</html>
